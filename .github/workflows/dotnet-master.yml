name: CI / CD (Multi-Project .NET 10)

on:
  push:
    branches:
      - main
      - '**'
  pull_request:
    branches:
      - main

permissions:
  contents: write
  packages: write

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Calculate version
        run: |
          BASE_VERSION=$(cat .version)
          VERSION="$BASE_VERSION.${{ github.run_number }}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Calculated version: $VERSION"

      - name: Restore all projects
        run: dotnet restore

      - name: Build solution
        run: dotnet build Infrastructure.sln -p:Version=${{ env.VERSION }} --no-restore

      - name: Run tests with coverage
        run: |
          mkdir -p ./coverage
          for testproj in $(find . -name '*.csproj' -not -path '*/bin/*' -not -path '*/obj/*'); do
            if grep -q "Microsoft.NET.Test.Sdk" "$testproj" && ! grep -q "<IsPackable>true</IsPackable>" "$testproj"; then
              name=$(basename "$testproj" .csproj)
              echo "Running tests: $testproj"
              dotnet test "$testproj" --no-build \
                --collect:"XPlat Code Coverage" \
                --results-directory "./coverage/$name" \
                --logger "trx;LogFileName=$name.trx" \
                -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura
            fi
          done

      - name: Install ReportGenerator
        run: dotnet tool install -g dotnet-reportgenerator-globaltool

      - name: Merge coverage reports
        run: |
          reportgenerator \
            -reports:"./coverage/**/coverage.cobertura.xml" \
            -targetdir:"./coverage/report" \
            -reporttypes:"Cobertura;MarkdownSummaryGithub;Badges" \
            -verbosity:Warning

      - name: Write coverage summary to GitHub Step Summary
        run: cat ./coverage/report/SummaryGithub.md >> $GITHUB_STEP_SUMMARY

      - name: Upload coverage report artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ./coverage/report/
          retention-days: 30

      - name: Upload coverage badge to gh-pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./coverage/report
          destination_dir: badges
          publish_branch: gh-pages
          keep_files: true

  publish:
    name: Publish NuGet Packages
    needs: build-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Calculate version
        run: |
          BASE_VERSION=$(cat .version)
          VERSION="$BASE_VERSION.${{ github.run_number }}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Calculated version: $VERSION"

      - name: Restore solution
        run: dotnet restore Infrastructure.sln

      - name: Detect and pack packable projects
        run: |
          for proj in $(find . -name '*.csproj'); do
            if grep -q "<IsPackable>true</IsPackable>" "$proj"; then
              echo "Packing project: $proj"
              dotnet build "$proj" -c Release -p:Version=${{ env.VERSION }} --no-restore
              dotnet pack "$proj" -c Release -p:PackageVersion=${{ env.VERSION }} --no-build -o ./artifacts
            fi
          done

      - name: Publish packages to GitHub Packages
        run: |
          dotnet nuget push ./artifacts/*.nupkg \
            --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
            --api-key ${{ secrets.GITHUB_TOKEN }} \
            --skip-duplicate

      - name: Publish packages to NuGet.org
        run: |
          dotnet nuget push ./artifacts/*.nupkg \
            --source "https://api.nuget.org/v3/index.json" \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --skip-duplicate

